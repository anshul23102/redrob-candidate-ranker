ai_usage_summary: |
  Used Claude (Claude Code) as an engineering collaborator: architecture discussion,
  code drafting and review, and data profiling under human direction. All design
  decisions (consensus gating, honeypot policy, evidence-from-work principle, eval
  labels) were reviewed and owned by the team. No candidate data was sent to any
  hosted LLM; the ranking step itself uses no LLM and makes no network calls.

methodology_summary: |
  Rubric-reconstruction ranker with defense-in-depth. We treat the JD's final section
  as the ground-truth rubric and rebuild it as code: a consensus gate (geometric mean
  of role-fit and evidence-fit) so keyword-stuffed profiles with wrong titles cannot
  reach the top; evidence read from career descriptions (the work) rather than
  headlines; a skill-trust layer (proficiency x endorsements x duration, grounded in
  the work); an integrity layer that hard-gates impossible profiles (honeypots:
  role duration exceeding time-since-start, expert skills with zero months used,
  tenure exceeding stated experience) while merely soft-discounting noisy
  inconsistencies; an availability multiplier from Redrob behavioral signals; and a
  precomputed local-embedding semantic layer (MiniLM) that rescues strong profiles
  describing elite ranking work in plain language. Every ranked candidate gets
  fact-grounded reasoning plus one honest concern. Evaluated on a 55-candidate
  hand-labeled gold set (NDCG@10 0.93, composite 0.95) and a full-pool trap-leak
  test: 0 honeypots / 0 stuffers / 0 CV-primary in our top-100 vs 33 stuffers for a
  naive keyword ranker. Ranking runs in ~11s for 100K candidates on CPU, offline.

declarations:
  read_submission_spec: true
  code_is_original_work: true
  no_collusion: true
  honeypot_check_done: true
  reproduction_tested: true
